# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake on a single platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Build both configurations to match typical local VS usage.
  BUILD_TYPES: "Debug Release"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # If your local machine already has the SDK under out/install/*, CI won't.
    # Restore it from an artifact (recommended) or unpack it from the repo.
    # Option A (recommended): download a previously uploaded artifact named 'imulinksdk-install'.
    - name: Download IMULinkSDK install layout (out/install)
      uses: actions/download-artifact@v4
      with:
        name: imulinksdk-install
        path: out/install
      continue-on-error: true

    # Option B: unpack from repository if you commit a zip under sdk/ (adjust the path/name to your repo).
    - name: Unpack IMULinkSDK from repository (fallback)
      shell: pwsh
      run: |
        if (-not (Test-Path "${{ github.workspace }}\out\install")) {
          Write-Host "out/install not found; expecting SDK package under sdk/. Skipping if not present."
        }
        $zip = Join-Path "${{ github.workspace }}" "sdk\imulinksdk-install.zip"
        if ((-not (Test-Path "${{ github.workspace }}\out\install")) -and (Test-Path $zip)) {
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\out\install" | Out-Null
          Expand-Archive -Path $zip -DestinationPath "${{ github.workspace }}\out\install" -Force
        }

    - name: Configure/Build/Test (Debug, Release)
      shell: pwsh
      run: |
        foreach ($cfg in $env:BUILD_TYPES.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)) {
          $bdir = "${{ github.workspace }}\out\build\x64-$cfg"
          cmake -S "${{ github.workspace }}" -B $bdir -DCMAKE_BUILD_TYPE=$cfg
          cmake --build $bdir --config $cfg
          ctest --test-dir $bdir -C $cfg
        }

